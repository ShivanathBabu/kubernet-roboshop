apiVersion: v1
kind: PersistentVolume
metadata:
  name: roboshop-pv
spec:
  accessModes:
  - ReadWriteOnce
  capacity:
    storage: 15Gi
  csi:
    driver: ebs.csi.aws.com
    fsType: ext4
    volumeHandle: vol-03c604538dd7d2f41
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: roboshop-claim
spec:
  storageClassName: "" # Empty string must be explicitly set otherwise default StorageClass will be set
  volumeName: roboshop-pv
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: Pod
metadata:
  name: app
  labels:
    project: roboshop-ebs
spec:
  containers:
  - name: app
    image: nginx
    volumeMounts:
    - name: persistent-storage
      mountPath: /usr/share/nginx/html
  volumes:
  - name: persistent-storage
    persistentVolumeClaim:
      claimName: ebs-claim
---
apiVersion: v1
kind: Service
metadta: 
  name: ebs-Service
  labels:
    project: roboshop-ebs
spec: 
  type: LoadBalancer
  selector:
    project: roboshop-ebs
  ports:
  - protocol: TCP
    port: 80
    targetPort: 80