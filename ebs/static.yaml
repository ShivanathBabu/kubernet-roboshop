apiVersion: v1
kind: PersistentVolume
metadata:
  name: roboshop-pv
spec:
  accessModes:
  - ReadWriteOnce
  capacity:
    storage: 50Gi
  csi:
    driver: ebs.csi.aws.com
    fsType: ext4
    volumeHandle: vol-08936404cdab8a10b
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: roboshop-claim
spec:
  storageClassName: "" # Empty string must be explicitly set otherwise default StorageClass will be set
  volumeName: roboshop-pv
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 45Gi
---
apiVersion: v1
kind: Pod
metadata:
  name: app
  labels:
    project: roboshop-ebs
spec:
  nodeSelector:
    topology.kubernetes.io/zone: us-east-1f
  containers:
  - name: app
    image: nginx
    volumeMounts:
    - name: persistent-storage
      mountPath: /usr/share/nginx/html
  volumes:
  - name: persistent-storage
    persistentVolumeClaim:
      claimName: roboshop-claim
---
apiVersion: v1
kind: Service
metadata: 
  name: ebs-service
  labels:
    project: roboshop-ebs
spec: 
  type: LoadBalancer
  selector:
    project: roboshop-ebs
  ports:
  - protocol: TCP
    port: 80
    targetPort: 80