apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalogue
  labels:
    project: roboshop
    tier: app
spec:
  replicas: 2
  selector:
    matchLabels:
      project: roboshop
      tier: app
  template:
    metadata:
      labels:
        project: roboshop
        tier: app
    spec:
      containers:
      - name: catalogue
        image: "{{ .Values.Deployment.image }}:{{ .Values.Deployment.imageversion }}"
        envFrom:
        - configMapRef:
            name: catalogue
        resources:
          requests:
            memory: "64Mi"
            cpu: "250m"
          limits:
            memory: "128Mi"
            cpu: "500m"



      
  