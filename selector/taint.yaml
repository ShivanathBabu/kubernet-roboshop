apiVersion: v1
kind: Pod
metadata:
  name: nginx
  labels:
    env: test
spec:
  containers:
  - name: nginx
    image: nginx
    imagePullPolicy: Always
  nodeSelector:
    disktype: ssd
  tolerations:
  -  key: "value1"
     operator: "Equal"
     value: "value1"
     effect: "NoSchedule"
  -  key: "value1"
     operator: "Equal"
     value: "value1"
     effect: "NoExecute"
