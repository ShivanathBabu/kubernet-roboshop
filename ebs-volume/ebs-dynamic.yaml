apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ebs-claim
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: ebs-sc
  resources:
    requests:
      storage: 4Gi
---
apiVersion: v1
kind: Pod
metadata:
  name: app
  labels:
    project: ebs-dynamic
spec:
  nodeSelector: 
    topology.kubernetes.io/zone: us-east-1c
  containers:
  - name: app
    image: nginx
    volumeMounts:
    - name: persistent-storage
      mountPath: /usr/share/nginx/html
  volumes:
  - name: persistent-storage
    persistentVolumeClaim:
      claimName: ebs-claim
---
apiVersion: v1
kind: Service
metadata:
  name: app
  labels:
    project: ebs-dynamic
spec:
  type: LoadBalancer
  selector:
    project: ebs-dynamic
  ports:
  - protocol: TCP
    port: 80
    targetPort: 80